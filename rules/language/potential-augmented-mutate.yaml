package: moonbitlang/core
description: |
  This assignment mutates a variable by combining it with another value.
  Prefer augmented assignment such as `+=`, `-=`, `*=`, `/=` to make the
  in-place update explicit.
patterns:
  - shape: |
      variable = variable + __
    metavars:
      identifier: [variable]
  - shape: |
      variable = __ + variable
    metavars:
      identifier: [variable]
  - shape: |
      variable = variable * __
    metavars:
      identifier: [variable]
  - shape: |
      variable = __ * variable
    metavars:
      identifier: [variable]
  - shape: |
      variable = variable - __
    metavars:
      identifier: [variable]
  - shape: |
      variable = variable / __
    metavars:
      identifier: [variable]
  - shape: |
      record.field = record.field + __
    metavars:
      subtree: [record]
      identifier: [field]
  - shape: |
      record.field = __ + record.field
    metavars:
      subtree: [record]
      identifier: [field]
  - shape: |
      record.field = record.field * __
    metavars:
      subtree: [record]
      identifier: [field]
  - shape: |
      record.field = __ * record.field
    metavars:
      subtree: [record]
      identifier: [field]
  - shape: |
      record.field = record.field - __
    metavars:
      subtree: [record]
      identifier: [field]
  - shape: |
      record.field = record.field / __
    metavars:
      subtree: [record]
      identifier: [field]
