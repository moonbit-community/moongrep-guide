package: moonbit-community/rabbita/html
description: |
  These HTML link builders accept raw `href` values. Without scheme and domain
  validation they can create `javascript:` links or phishing redirects.
patterns:
  - shape: |
      @html.a(href=_url, _text)
    metavars: [_url, _text]
  - shape: |
      @html.node("a", @html.Attrs::build().href(_url), _children)
    metavars: [_url, _children]
