package: moonbit-community/rabbita/http
description: |
  These Rabbita HTTP helpers only fail on network errors. Treating `Ok(...)` as
  synonymous with a successful HTTP status can mis-handle 4xx and 5xx
  responses.
patterns:
  - shape: |
      @http.get(_url, expect=Text(_handler))
    metavars: [_url, _handler]
  - shape: |
      @http.post(_url, _body, expect=Text(_handler))
    metavars: [_url, _body, _handler]
  - shape: |
      @http.patch(_url, _body, expect=Text(_handler))
    metavars: [_url, _body, _handler]
  - shape: |
      @http.delete(_url, expect=Text(_handler))
    metavars: [_url, _handler]
