package: moonbit-community/rabbita/http
description: |
  These Rabbita HTTP helpers only fail on network errors. Treating `Ok(...)` as
  synonymous with a successful HTTP status can mis-handle 4xx and 5xx
  responses.
patterns:
  - shape: |
      @http.get(__, expect=Text(__))
  - shape: |
      @http.post(__, __, expect=Text(__))
  - shape: |
      @http.patch(__, __, expect=Text(__))
  - shape: |
      @http.delete(__, expect=Text(__))
