package: moonbit-community/rabbita/js
description: |
  These `js.Value` constructor helpers allow arbitrary runtime object creation.
  When the constructor or payload is attacker-controlled, they can instantiate
  dangerous builtins such as `Function`.
patterns:
  - shape: |
      _ctor.new(_args)
    metavars:
      structural: [_ctor, _args]
  - shape: |
      _value.new_with_string(_name, _args)
    metavars:
      structural: [_value, _name, _args]
  - shape: |
      _value.new_with_index(_index, _args)
    metavars:
      structural: [_value, _index, _args]
  - shape: |
      _value.new_with_symbol(_symbol, _args)
    metavars:
      structural: [_value, _symbol, _args]
