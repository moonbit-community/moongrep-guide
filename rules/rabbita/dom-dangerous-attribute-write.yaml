package: moonbit-community/rabbita/dom
description: |
  Writing untrusted content into dangerous DOM sinks such as `srcdoc` via
  `set_attribute(...)` or `set_property(...)` can execute attacker-controlled
  HTML or script.
patterns:
  - shape: |
      __.set_attribute("srcdoc", __)
  - shape: |
      __.set_property("srcdoc", __)
