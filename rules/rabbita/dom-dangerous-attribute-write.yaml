package: moonbit-community/rabbita/dom
description: |
  Writing untrusted content into dangerous DOM sinks such as `srcdoc` via
  `set_attribute(...)` or `set_property(...)` can execute attacker-controlled
  HTML or script.
patterns:
  - shape: |
      _node.set_attribute("srcdoc", _html)
    metavars:
      structural: [_node, _html]
  - shape: |
      _node.set_property("srcdoc", _value)
    metavars:
      structural: [_node, _value]
