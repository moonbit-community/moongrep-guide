package: moonbit-community/rabbita/js
description: |
  These `js.Value` setters perform arbitrary property writes. Untrusted keys
  or values can mutate globals, DOM objects, or even trigger prototype
  pollution.
patterns:
  - shape: |
      _value.set_with_string(_key, _payload)
    metavars:
      structural: [_value, _key, _payload]
  - shape: |
      _value.set_with_index(_index, _payload)
    metavars:
      structural: [_value, _index, _payload]
  - shape: |
      _value.set_with_symbol(_symbol, _payload)
    metavars:
      structural: [_value, _symbol, _payload]
