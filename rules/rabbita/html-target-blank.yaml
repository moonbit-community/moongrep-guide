package: moonbit-community/rabbita/html
description: |
  Opening untrusted URLs in a new tab without also setting
  `rel="noopener noreferrer"` allows reverse tabnabbing via `window.opener`.
patterns:
  - shape: |
      @html.a(href=_url, target=Blank, _text)
    metavars:
      structural: [_url, _text]
  - shape: |
      @html.node("a", @html.Attrs::build().href(_url).target(Blank), _children)
    metavars:
      structural: [_url, _children]
