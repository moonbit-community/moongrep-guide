package: moonbit-community/rabbita/js
description: |
  These `js.Value` call helpers perform arbitrary JavaScript invocation. If the
  callee or method name is user-controlled, they can turn into script
  execution, navigation, or network requests.
patterns:
  - shape: |
      _value.apply(_args)
    metavars:
      structural: [_value, _args]
  - shape: |
      _value.apply_with_string(_name, _args)
    metavars:
      structural: [_value, _name, _args]
  - shape: |
      _value.apply_with_index(_index, _args)
    metavars:
      structural: [_value, _index, _args]
  - shape: |
      _value.apply_with_symbol(_symbol, _args)
    metavars:
      structural: [_value, _symbol, _args]
