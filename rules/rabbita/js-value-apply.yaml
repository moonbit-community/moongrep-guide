package: moonbit-community/rabbita/js
description: |
  These `js.Value` call helpers perform arbitrary JavaScript invocation. If the
  callee or method name is user-controlled, they can turn into script
  execution, navigation, or network requests.
patterns:
  - shape: |
      __.apply(__)
  - shape: |
      __.apply_with_string(__, __)
  - shape: |
      __.apply_with_index(__, __)
  - shape: |
      __.apply_with_symbol(__, __)
