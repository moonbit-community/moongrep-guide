package: moonbit-community/rabbita/html
description: |
  These HTML builders create active content, inline documents, or page-wide URL
  rewriting behavior. Feeding them untrusted URLs or HTML can cause XSS,
  dangerous navigation, or third-party content loading.
patterns:
  - shape: |
      @html.script(src=__, __)
  - shape: |
      @html.script(src~, __)
  - shape: |
      @html.Attrs::build().srcdoc(__)
  - shape: |
      @html.iframe(src=__)
  - shape: |
      @html.fencedframe(src=__)
  - shape: |
      @html.object(attrs=@html.Attrs::build().data(__).type_(__), __)
  - shape: |
      @html.embed(attrs=@html.Attrs::build().src(__).type_(__))
  - shape: |
      @html.base(href=__)
  - shape: |
      @html.meta(http_equiv="refresh", content="0;url=" + __)
