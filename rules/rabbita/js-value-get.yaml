package: moonbit-community/rabbita/js
description: |
  These `js.Value` getters expose arbitrary property reads. With untrusted
  keys, they become the first hop to dangerous JavaScript gadgets.
patterns:
  - shape: |
      _value.get_with_string(_key)
    metavars: [_value, _key]
  - shape: |
      _value.get_with_index(_index)
    metavars: [_value, _index]
  - shape: |
      _value.get_with_symbol(_symbol)
    metavars: [_value, _symbol]
