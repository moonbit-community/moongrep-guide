package: moonbit-community/rabbita/svg
description: |
  These SVG APIs accept raw URLs for navigation or external resource loading.
  Untrusted values can trigger dangerous links, tracking beacons, or cross-site
  requests.
patterns:
  - shape: |
      @svg.node("a", @svg.Attrs::build().href(_url), _children)
    metavars:
      subtree: [_url, _children]
  - shape: |
      @svg.image(href=_url, x=_x, y=_y)
    metavars:
      subtree: [_url, _x, _y]
  - shape: |
      @svg.svg_use(href=_url, x=_x, y=_y)
    metavars:
      subtree: [_url, _x, _y]
