package: moonbit-community/rabbita/svg
description: |
  These SVG APIs accept raw URLs for navigation or external resource loading.
  Untrusted values can trigger dangerous links, tracking beacons, or cross-site
  requests.
patterns:
  - shape: |
      @svg.node("a", @svg.Attrs::build().href(__), __)
  - shape: |
      @svg.image(href=__, x=__, y=__)
  - shape: |
      @svg.svg_use(href=__, x=__, y=__)
