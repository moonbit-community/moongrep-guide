package: moonbitlang/async/fs
description: |
  These file APIs overwrite existing content when `truncate=true` is used, and
  `@fs.write_file(...)` truncates by default. Passing untrusted paths here can
  destroy arbitrary writable files.
patterns:
  - shape: |
      @fs.open(__, mode=__, truncate=true)
  - shape: |
      @fs.open(__, mode~, truncate=true)
  - shape: |
      @fs.write_file(__, __)
  - shape: |
      @fs.write_file(__, __, truncate=true)
