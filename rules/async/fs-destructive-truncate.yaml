package: moonbitlang/async/fs
description: |
  These file APIs overwrite existing content when `truncate=true` is used, and
  `@fs.write_file(...)` truncates by default. Passing untrusted paths here can
  destroy arbitrary writable files.
patterns:
  - shape: |
      @fs.open(_path, mode=_mode, truncate=true)
    metavars:
      structural: [_path, _mode]
  - shape: |
      @fs.open(_path, mode~, truncate=true)
    metavars:
      structural: [_path]
  - shape: |
      @fs.write_file(_path, _content)
    metavars:
      structural: [_path, _content]
  - shape: |
      @fs.write_file(_path, _content, truncate=true)
    metavars:
      structural: [_path, _content]
