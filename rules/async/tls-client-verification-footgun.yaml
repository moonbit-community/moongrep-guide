package: moonbitlang/async/tls
description: |
  These TLS client calls are easy to misuse: `verify=true` without `host`
  skips hostname validation, and `verify=false` disables certificate checks
  entirely.
patterns:
  - shape: |
      @tls.Tls::client(_stream, verify=true)
    metavars:
      structural: [_stream]
  - shape: |
      @tls.Tls::client(_stream, verify=false, host=_host)
    metavars:
      structural: [_stream, _host]
  - shape: |
      @tls.Tls::client_from_pair(_reader, _writer, verify=true)
    metavars:
      structural: [_reader, _writer]
