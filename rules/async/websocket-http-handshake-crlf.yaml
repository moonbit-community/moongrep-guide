package: moonbitlang/async/websocket
description: |
  Passing user-controlled WebSocket handshake URLs, paths, or header maps into
  these APIs can inject raw HTTP bytes into the Upgrade request if the value
  contains `\r` or `\n`.
patterns:
  - shape: |
      @websocket.connect(_url, headers=_headers)
    metavars: [_url, _headers]
  - shape: |
      @websocket.from_http_client(_client, _path)
    metavars: [_client, _path]
