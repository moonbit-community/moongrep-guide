package: moonbitlang/async/http
description: |
  Passing user-controlled request paths, URLs, header maps, or response
  reasons into these HTTP APIs can become header injection, request smuggling,
  or response splitting if the value contains `\r` or `\n`.
patterns:
  - shape: |
      @http.Client::new(_url, headers=_headers)
    metavars:
      subtree: [_url, _headers]
  - shape: |
      _client.request(_method, _path)
    metavars:
      subtree: [_client, _method, _path]
  - shape: |
      @http.get(_url)
    metavars:
      subtree: [_url]
  - shape: |
      @http.post(_url, _content)
    metavars:
      subtree: [_url, _content]
  - shape: |
      @http.put(_url, _content)
    metavars:
      subtree: [_url, _content]
  - shape: |
      @http.get_stream(_url)
    metavars:
      subtree: [_url]
  - shape: |
      @http.post_stream(_url, headers=_headers)
    metavars:
      subtree: [_url, _headers]
  - shape: |
      @http.put_stream(_url, headers=_headers)
    metavars:
      subtree: [_url, _headers]
  - shape: |
      _conn.send_response(_status, _reason)
    metavars:
      subtree: [_conn, _status, _reason]
