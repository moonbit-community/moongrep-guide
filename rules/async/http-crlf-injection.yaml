package: moonbitlang/async/http
description: |
  Passing user-controlled request paths, URLs, header maps, or response
  reasons into these HTTP APIs can become header injection, request smuggling,
  or response splitting if the value contains `\r` or `\n`.
patterns:
  - shape: |
      @http.Client::new(__, headers=__)
  - shape: |
      __.request(__, __)
  - shape: |
      @http.get(__)
  - shape: |
      @http.post(__, __)
  - shape: |
      @http.put(__, __)
  - shape: |
      @http.get_stream(__)
  - shape: |
      @http.post_stream(__, headers=__)
  - shape: |
      @http.put_stream(__, headers=__)
  - shape: |
      __.send_response(__, __)
