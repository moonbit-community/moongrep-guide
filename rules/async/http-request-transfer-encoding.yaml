package: moonbitlang/async/http
description: |
  Passing a user-controlled `Transfer-Encoding` header via `headers` or
  `extra_headers` to `[@http.Client::new, @http.Client::request,
  @http.Client::get, @http.Client::put, @http.Client::post, @http.get,
  @http.put, @http.post, @http.get_stream, @http.put_stream,
  @http.post_stream]` can create an ambiguous HTTP message and may enable
  request smuggling.
patterns:
  - shape: |
      @http.Client::new(_url, headers={ "Transfer-Encoding": _value })
    metavars:
      subtree: [_url, _value]
  - shape: |
      _client.request(_method, _path, extra_headers={ "Transfer-Encoding": _value })
    metavars:
      subtree: [_client, _method, _path, _value]
  - shape: |
      _client.get(_path, extra_headers={ "Transfer-Encoding": _value })
    metavars:
      subtree: [_client, _path, _value]
  - shape: |
      _client.put(_path, _content, extra_headers={ "Transfer-Encoding": _value })
    metavars:
      subtree: [_client, _path, _content, _value]
  - shape: |
      _client.post(_path, _content, extra_headers={ "Transfer-Encoding": _value })
    metavars:
      subtree: [_client, _path, _content, _value]
  - shape: |
      @http.get(_url, headers={ "Transfer-Encoding": _value })
    metavars:
      subtree: [_url, _value]
  - shape: |
      @http.put(_url, _content, headers={ "Transfer-Encoding": _value })
    metavars:
      subtree: [_url, _content, _value]
  - shape: |
      @http.post(_url, _content, headers={ "Transfer-Encoding": _value })
    metavars:
      subtree: [_url, _content, _value]
  - shape: |
      @http.get_stream(_url, headers={ "Transfer-Encoding": _value })
    metavars:
      subtree: [_url, _value]
  - shape: |
      @http.put_stream(_url, headers={ "Transfer-Encoding": _value })
    metavars:
      subtree: [_url, _value]
  - shape: |
      @http.post_stream(_url, headers={ "Transfer-Encoding": _value })
    metavars:
      subtree: [_url, _value]
