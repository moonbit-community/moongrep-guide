package: moonbitlang/async/http
description: |
  Passing a user-controlled `Transfer-Encoding` header via `headers` or
  `extra_headers` to `[@http.Client::new, @http.Client::request,
  @http.Client::get, @http.Client::put, @http.Client::post, @http.get,
  @http.put, @http.post, @http.get_stream, @http.put_stream,
  @http.post_stream]` can create an ambiguous HTTP message and may enable
  request smuggling.
patterns:
  - shape: |
      @http.Client::new(__, headers={ "Transfer-Encoding": __ })
  - shape: |
      __.request(__, __, extra_headers={ "Transfer-Encoding": __ })
  - shape: |
      __.get(__, extra_headers={ "Transfer-Encoding": __ })
  - shape: |
      __.put(__, __, extra_headers={ "Transfer-Encoding": __ })
  - shape: |
      __.post(__, __, extra_headers={ "Transfer-Encoding": __ })
  - shape: |
      @http.get(__, headers={ "Transfer-Encoding": __ })
  - shape: |
      @http.put(__, __, headers={ "Transfer-Encoding": __ })
  - shape: |
      @http.post(__, __, headers={ "Transfer-Encoding": __ })
  - shape: |
      @http.get_stream(__, headers={ "Transfer-Encoding": __ })
  - shape: |
      @http.put_stream(__, headers={ "Transfer-Encoding": __ })
  - shape: |
      @http.post_stream(__, headers={ "Transfer-Encoding": __ })
