package: moonbitlang/async/process
description: |
  These helpers collect full child-process output into memory before
  returning. A noisy or non-terminating process can exhaust memory.
patterns:
  - shape: |
      @process.collect_stdout(command, args)
    metavars: [command, args]
  - shape: |
      @process.collect_stderr(command, args)
    metavars: [command, args]
  - shape: |
      @process.collect_output(command, args)
    metavars: [command, args]
  - shape: |
      @process.collect_output_merged(command, args)
    metavars: [command, args]
