package: moonbitlang/async/process
description: |
  These helpers collect full child-process output into memory before
  returning. A noisy or non-terminating process can exhaust memory.
patterns:
  - shape: |
      @process.collect_stdout(_command, _args)
    metavars:
      structural: [_command, _args]
  - shape: |
      @process.collect_stderr(_command, _args)
    metavars:
      structural: [_command, _args]
  - shape: |
      @process.collect_output(_command, _args)
    metavars:
      structural: [_command, _args]
  - shape: |
      @process.collect_output_merged(_command, _args)
    metavars:
      structural: [_command, _args]
