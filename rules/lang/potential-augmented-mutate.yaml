package: moonbitlang/core
description: |
  This assignment mutates a variable by combining it with another value.
  Prefer augmented assignment such as `+=`, `-=`, `*=`, `/=` to make the
  in-place update explicit.
patterns:
  - shape: |
      variable = variable + __
    metavars:
      identifier: [variable]
  - shape: |
      variable = __ + variable
    metavars:
      identifier: [variable]
  - shape: |
      variable = variable * __
    metavars:
      identifier: [variable]
  - shape: |
      variable = __ * variable
    metavars:
      identifier: [variable]
  - shape: |
      variable = variable - __
    metavars:
      identifier: [variable]
  - shape: |
      variable = variable / __
    metavars:
      identifier: [variable]
